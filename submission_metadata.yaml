  - "OpenRouter"    # OFFLINE one-shot JD -> rubric parsing only (build_rubric.py)

ai_usage_summary: |
  An LLM (via OpenRouter) is used ONCE, offline, to parse the free-text job
  description into a structured ranking rubric (artifacts/jd_rubric.json), which
  is committed to the repo. NO LLM/API call happens during the ranking step:
  rank.py is pure-Python, CPU-only, no network, and reads the frozen rubric.
  No candidate data is ever sent to any LLM. Claude was used for architecture
  discussion and code review during development.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Structural-reasoning ranker, not embedding keyword-match. A JD rubric
  (LLM-parsed offline, committed) drives seven transparent scoring components:
  role relevance (the decisive anti-keyword-stuffer signal — current title vs a
  padded AI skills list), requirement evidence weighted by WHERE it appears
  (career-history descriptions >> skills list), skill-trust (proficiency x real
  usage x endorsements x on-platform assessment, which defuses "expert in 10
  skills, 0 months used"), experience-band fit, trajectory (product-company bias;
  consulting-only, title-chasing, research-only, CV/speech-only disqualifiers
  from the JD), a lightweight semantic concept-family match for plain-language
  candidates, and location. A multiplicative behavioral modifier down-weights
  perfect-on-paper but unreachable candidates (response rate, recency,
  open-to-work, notice). Honeypots are caught as an internal-consistency tax,
  not a special-case lookup, so unseen impossible profiles are also handled.
  Reasoning strings are generated deterministically from extracted facts (no
  hallucination possible). Runtime: ~45s for 100k candidates on CPU, stdlib only. A test suite (test_rank.py) guards the output contract for Stage-3 reproduction.

